<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>HC² GASLUB EPC05 · Dashboard Inspeção v5</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{
  --navy:#182554;--orange:#E56C35;--white:#fff;--grey:#4D4F53;
  --red:#C8102E;--ltg:#BBBCBC;--teal:#00617F;--b1:#6599AE;
  --b2:#0086BF;--cyan:#31B1D9;--dk:#333F48;--g2:#798189;
  --acc:#FF6A13;--lgt:#FFA770;--yellow:#FFB81C;--green:#10B981;
  --purple:#7C3AED;--emerald:#059669;--rose:#DC2626;
  --bg:#eef1f8;--card:#fff;--bdr:#d4dae8;
  --sh:0 2px 12px rgba(24,37,84,.10);--shl:0 6px 28px rgba(24,37,84,.16);
  --r:12px;--rs:8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--grey);font-size:13px;min-height:100vh}

/* ── HEADER ── */
.hdr{background:linear-gradient(135deg,var(--navy) 0%,#1e3a8a 60%,var(--teal) 100%);color:#fff;position:sticky;top:0;z-index:1000;box-shadow:0 4px 20px rgba(0,0,0,.35)}
.hdr-top{display:flex;align-items:center;padding:8px 16px;gap:12px;flex-wrap:wrap}
.logo-sq{background:var(--orange);color:#fff;font-weight:900;font-size:17px;width:40px;height:40px;border-radius:9px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(229,108,53,.5);flex-shrink:0}
.hdr-info h1{font-size:13.5px;font-weight:800;white-space:nowrap}
.hdr-info p{font-size:9.5px;opacity:.6;margin-top:1px}
.hdr-badges{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-left:auto}
.hdr-badge{font-size:10.5px;background:rgba(255,255,255,.12);padding:4px 11px;border-radius:16px;border:1px solid rgba(255,255,255,.15);white-space:nowrap;font-weight:600}
.hdr-badge.today{background:rgba(229,108,53,.25);border-color:rgba(229,108,53,.5)}
.hdr-badge.danger{background:rgba(200,16,46,.25);border-color:rgba(200,16,46,.4);cursor:pointer}
.hdr-badge.warn{background:rgba(255,184,28,.2);border-color:rgba(255,184,28,.4)}
.sync-strip{background:rgba(0,0,0,.18);border-top:1px solid rgba(255,255,255,.07);padding:5px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sync-strip label{font-size:10px;font-weight:700;color:rgba(255,255,255,.7);white-space:nowrap}
.sync-btn{padding:4px 14px;background:var(--orange);border:none;border-radius:6px;color:#fff;font-size:10.5px;font-weight:700;cursor:pointer;transition:.15s}
.sync-btn:hover{background:var(--acc)}
.sync-btn.green{background:rgba(5,150,105,.6);border:1px solid rgba(16,185,129,.5)}
.sync-status{font-size:10px;color:rgba(255,255,255,.65);flex:1;font-style:italic}
.nav-bar{background:rgba(0,0,0,.22);border-top:1px solid rgba(255,255,255,.07);padding:3px 16px;display:flex;gap:2px;overflow-x:auto}
.nav-tab{padding:5px 12px;border:none;background:transparent;color:rgba(255,255,255,.6);cursor:pointer;border-radius:6px;font-size:10.5px;font-weight:700;white-space:nowrap;transition:.15s;position:relative}
.nav-tab:hover{background:rgba(255,255,255,.1);color:#fff}
.nav-tab.active{background:var(--orange);color:#fff}
.nav-badge{position:absolute;top:1px;right:1px;background:var(--red);color:#fff;border-radius:8px;font-size:8px;padding:0 4px;font-weight:900}

/* ── MAIN ── */
.main{padding:14px 16px;max-width:1920px;margin:0 auto}
.view{display:none}.view.active{display:block}

/* ── CARDS & GRIDS ── */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:12px}
.kpi{background:var(--card);border-radius:var(--rs);padding:11px 13px;box-shadow:var(--sh);border-left:4px solid var(--navy);transition:transform .15s,box-shadow .15s}
.kpi:hover{transform:translateY(-2px);box-shadow:var(--shl)}
.kpi-lbl{font-size:9px;color:var(--g2);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.kpi-val{font-size:22px;font-weight:900;line-height:1}
.kpi-sub{font-size:10px;color:var(--g2);margin-top:2px}
.kpi-bar{height:3px;border-radius:2px;background:var(--bdr);margin-top:6px;overflow:hidden}
.kpi-fill{height:100%;border-radius:2px;transition:width 1.4s ease}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.card{background:var(--card);border-radius:var(--r);padding:13px 15px;box-shadow:var(--sh)}
.card.full{grid-column:1/-1}
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px;flex-wrap:wrap}
.card-title{font-size:12px;font-weight:800;color:var(--navy)}
.card-info{font-size:9px;color:var(--g2);background:var(--bg);border-radius:5px;padding:2px 8px;cursor:help;white-space:nowrap;border:1px solid var(--bdr)}
.cw{position:relative}
.h200{height:200px}.h260{height:260px}.h280{height:280px}.h300{height:300px}.h340{height:340px}.h380{height:380px}

/* ── DISC TABS ── */
.disc-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.disc-tab{padding:5px 14px;border:2px solid var(--bdr);border-radius:20px;cursor:pointer;font-size:10.5px;font-weight:700;color:var(--g2);transition:.15s;background:var(--card)}
.disc-tab:hover{border-color:var(--navy);color:var(--navy)}
.disc-tab.active{color:#fff;border-color:transparent}

/* ── TABLES ── */
.tcard{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:12px}
.tbar{padding:9px 13px;display:flex;align-items:center;gap:7px;border-bottom:1px solid var(--bdr);flex-wrap:wrap;background:#fafbfd}
.tbar h3{font-size:11.5px;font-weight:800;color:var(--navy);flex:1;min-width:120px}
.fsel{border:1px solid var(--bdr);border-radius:6px;padding:4px 7px;font-size:10.5px;outline:none;cursor:pointer;background:#fff;color:var(--navy)}
.twrap{overflow-x:auto;max-height:420px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:11px}
thead{position:sticky;top:0;z-index:5}
th{background:var(--navy);color:#fff;padding:7px 8px;text-align:left;white-space:nowrap;font-size:10px;font-weight:700}
td{padding:5px 8px;border-bottom:1px solid var(--bdr);vertical-align:middle;white-space:nowrap}
tr:nth-child(even) td{background:#f7f9fc}
tr:hover td{background:#eef3ff!important}
.badge{display:inline-flex;align-items:center;gap:2px;padding:2px 7px;border-radius:8px;font-size:9.5px;font-weight:700;white-space:nowrap}
.b-ok{background:#D1FAE5;color:#065F46}.b-warn{background:#FEF3C7;color:#92400E}.b-danger{background:#FEE2E2;color:#991B1B}
.b-info{background:#E0F2FE;color:#0369A1}
.pag{display:flex;align-items:center;gap:7px;padding:7px 13px;border-top:1px solid var(--bdr);font-size:10.5px;color:var(--g2)}
.pbtn{border:1px solid var(--bdr);background:#fff;border-radius:5px;padding:3px 10px;cursor:pointer;font-size:10.5px}
.pbtn:hover{background:var(--navy);color:#fff;border-color:var(--navy)}
.pbtn:disabled{opacity:.35;cursor:default}

/* ── FOOTER ── */
.footer{text-align:center;padding:12px;font-size:10.5px;color:var(--g2);border-top:1px solid var(--bdr);margin-top:8px}
.footer a{color:var(--b2);text-decoration:none}

/* ── RESTRICOES ── */
.rest-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px;padding:2px}
.rest-card{background:var(--card);border-radius:var(--rs);padding:12px 14px;box-shadow:var(--sh);border-left:4px solid var(--bdr)}
.rest-card.aberta{border-left-color:var(--red)}
.rest-card.andamento{border-left-color:var(--yellow)}
.rest-card.concluida{border-left-color:var(--green);opacity:.75}
.rest-disc{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;background:#dde9ff;color:var(--navy);display:inline-block;margin-bottom:6px}
.rest-text{font-size:11.5px;font-weight:600;color:var(--dk);line-height:1.5;margin-bottom:6px;white-space:pre-wrap}
.rest-meta{font-size:9.5px;color:var(--g2);display:flex;gap:10px;align-items:center;flex-wrap:wrap}

/* ── 6WLA ── */
.wla-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:12px}
.wla-col{background:var(--card);border-radius:var(--rs);box-shadow:var(--sh);overflow:hidden;display:flex;flex-direction:column}
.wla-hdr{background:var(--navy);color:#fff;padding:7px 10px;text-align:center}
.wla-hdr.cur{background:var(--orange)}.wla-hdr.past{background:var(--dk);opacity:.7}
.wla-title{font-size:10.5px;font-weight:800}.wla-sub{font-size:8.5px;opacity:.75;margin-top:1px}
.wla-body{padding:8px;flex:1}
.wla-disc-row{display:flex;justify-content:space-between;align-items:center;padding:4px 6px;border-radius:5px;margin-bottom:3px;font-size:10px}
.wla-disc-name{font-weight:700;color:var(--navy);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wla-disc-vals{display:flex;gap:4px;font-size:9px;flex-shrink:0}
.wla-prog{color:var(--navy);font-weight:600}
.wla-real{font-weight:700}
.wla-pct-bar{height:3px;background:var(--bdr);border-radius:2px;margin-top:2px;overflow:hidden}
.wla-pct-fill{height:3px;border-radius:2px}
.wla-totrow{text-align:center;padding:5px;font-size:10.5px;font-weight:700;color:var(--navy);border-top:1px solid var(--bdr)}

/* ── KPI VIEW (scoped) ── */
#kpi-view-wrap{--kv-surface:#fff;--kv-surface2:#f7f9fc;--kv-surface3:#eef1f8;--kv-border:#d4dae8;--kv-border2:#b0bcd8;--kv-text:var(--grey);--kv-text2:var(--g2);--kv-blue:var(--navy);--kv-green:#059669;--kv-amber:#d97706;--kv-red:#dc2626;--kv-orange:var(--orange);--r:6px;--r2:10px;color:var(--kv-text)}
#kpi-view-wrap .kv-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px;padding:12px 16px;background:var(--navy);border-radius:var(--r2);color:#fff}
#kpi-view-wrap .kv-topbar h1{font-size:15px;font-weight:800;color:#fff;display:flex;align-items:center;gap:8px}
#kpi-view-wrap .kv-dot{width:8px;height:8px;border-radius:50%;background:var(--orange)}
#kpi-view-wrap .kv-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
#kpi-view-wrap .kv-select{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:var(--r);padding:5px 10px;font-size:12px;cursor:pointer}
#kpi-view-wrap .kv-select option{background:var(--navy);color:#fff}
#kpi-view-wrap .kv-week-chip{background:var(--orange);color:#fff;border-radius:var(--r);padding:4px 10px;font-size:11px;font-weight:700}
#kpi-view-wrap .kv-marco{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--kv-surface);border:1px solid var(--kv-border);border-radius:var(--r2);margin-bottom:12px;flex-wrap:wrap;box-shadow:var(--sh)}
#kpi-view-wrap .kv-marco-icon{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
#kpi-view-wrap .kv-marco-icon.ok{background:#d1fae5;border:1px solid #059669}
#kpi-view-wrap .kv-marco-icon.warn{background:#fef3c7;border:1px solid #d97706}
#kpi-view-wrap .kv-marco-icon.danger{background:#fee2e2;border:1px solid #dc2626}
#kpi-view-wrap .kv-marco-label{font-size:10px;color:var(--kv-text2);text-transform:uppercase;letter-spacing:.4px;font-weight:700}
#kpi-view-wrap .kv-marco-dias{font-size:22px;font-weight:900;line-height:1}
#kpi-view-wrap .kv-marco-dias.ok{color:#059669}.kv-marco-dias.warn{color:#d97706}.kv-marco-dias.danger{color:#dc2626}
#kpi-view-wrap .kv-marco-prog-wrap{flex:1;min-width:160px}
#kpi-view-wrap .kv-marco-prog-label{display:flex;justify-content:space-between;font-size:10px;color:var(--kv-text2);margin-bottom:4px}
#kpi-view-wrap .kv-marco-prog-bg{height:7px;background:var(--kv-surface3);border-radius:4px;overflow:hidden}
#kpi-view-wrap .kv-marco-prog-fill{height:7px;border-radius:4px;transition:width .5s;background:var(--navy)}
#kpi-view-wrap .kv-kpi-cards{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:12px}
#kpi-view-wrap .kv-kpi-card{background:var(--kv-surface);border:1px solid var(--kv-border);border-radius:var(--r2);padding:12px 14px;position:relative;overflow:hidden;box-shadow:var(--sh)}
#kpi-view-wrap .kv-kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
#kpi-view-wrap .kv-kpi-card.blue::before{background:var(--navy)}
#kpi-view-wrap .kv-kpi-card.green::before{background:#059669}
#kpi-view-wrap .kv-kpi-card.amber::before{background:var(--orange)}
#kpi-view-wrap .kv-kpi-card.purple::before{background:#7c3aed}
#kpi-view-wrap .kv-kpi-card.teal::before{background:var(--teal)}
#kpi-view-wrap .kv-kpi-label{font-size:9.5px;color:var(--kv-text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;font-weight:700}
#kpi-view-wrap .kv-kpi-val{font-size:22px;font-weight:900;line-height:1}
#kpi-view-wrap .kv-kpi-sub{font-size:10px;color:var(--kv-text2);margin-top:4px}
#kpi-view-wrap .kv-kpi-card.blue .kv-kpi-val{color:var(--navy)}
#kpi-view-wrap .kv-kpi-card.green .kv-kpi-val{color:#059669}
#kpi-view-wrap .kv-kpi-card.amber .kv-kpi-val{color:var(--orange)}
#kpi-view-wrap .kv-kpi-card.purple .kv-kpi-val{color:#7c3aed}
#kpi-view-wrap .kv-kpi-card.teal .kv-kpi-val{color:var(--teal)}
#kpi-view-wrap .kv-prog-mini{width:100%;height:3px;background:var(--kv-surface3);border-radius:2px;margin-top:4px}
#kpi-view-wrap .kv-prog-mini-bar{height:3px;border-radius:2px}
#kpi-view-wrap .kv-panel{background:var(--kv-surface);border:1px solid var(--kv-border);border-radius:var(--r2);margin-bottom:12px;box-shadow:var(--sh)}
#kpi-view-wrap .kv-panel-header{padding:10px 16px;border-bottom:1px solid var(--kv-border);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;background:#f7f9fc;border-radius:var(--r2) var(--r2) 0 0}
#kpi-view-wrap .kv-panel-title{font-size:11.5px;font-weight:800;color:var(--navy);text-transform:uppercase;letter-spacing:.5px}
#kpi-view-wrap .kv-panel-body{overflow-x:auto}
#kpi-view-wrap .kv-legend{display:flex;align-items:center;gap:12px;font-size:11px;flex-wrap:wrap}
#kpi-view-wrap .kv-legend-item{display:flex;align-items:center;gap:5px;color:var(--kv-text2)}
#kpi-view-wrap .kv-legend-dot{width:10px;height:10px;border-radius:2px}
#kpi-view-wrap .kv-type-tabs{display:flex;gap:4px;background:var(--kv-surface3);border-radius:var(--r);padding:3px}
#kpi-view-wrap .kv-type-tab{font-size:11px;padding:4px 12px;border-radius:5px;border:none;background:transparent;color:var(--kv-text2);cursor:pointer;font-weight:700;transition:all .15s;font-family:inherit}
#kpi-view-wrap .kv-type-tab.active{background:var(--navy);color:#fff}
#kpi-view-wrap .kv-table{width:100%;border-collapse:collapse;min-width:600px}
#kpi-view-wrap .kv-table th{background:var(--navy);color:#fff;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:9px 8px;border-bottom:1px solid var(--kv-border2);white-space:nowrap;text-align:center}
#kpi-view-wrap .kv-table th.left{text-align:left}
#kpi-view-wrap .kv-table th.day-th{min-width:68px}
#kpi-view-wrap .kv-table th.holiday-th{background:#92400e;color:#fef3c7}
#kpi-view-wrap .kv-table th.weekend-th{background:#065f46;color:#d1fae5}
#kpi-view-wrap .kv-table th.feriado-th{background:#991b1b;color:#fee2e2}
#kpi-view-wrap .kv-table th.today-th{background:var(--orange);color:#fff}
#kpi-view-wrap .kv-table td{padding:0;border-bottom:1px solid var(--kv-border);vertical-align:middle}
#kpi-view-wrap .kv-table tr:last-child td{border-bottom:none}
#kpi-view-wrap .kv-table tr:hover td{background:#f0f4ff!important}
#kpi-view-wrap .kv-disc-cell{background:var(--kv-surface2);padding:10px;border-right:2px solid var(--kv-border2);vertical-align:top}
#kpi-view-wrap .kv-disc-name{font-weight:800;color:var(--navy);font-size:12px}
#kpi-view-wrap .kv-ind-cell{padding:7px 10px;border-right:1px solid var(--kv-border2);font-size:11px;color:var(--kv-text2);white-space:nowrap;min-width:80px;background:var(--kv-surface3)}
#kpi-view-wrap .kv-ind-cell.pct-row{background:var(--kv-surface2);font-weight:700;color:var(--navy);font-size:12px}
#kpi-view-wrap .kv-day-cell{text-align:center;border-right:1px solid var(--kv-border);min-width:68px}
#kpi-view-wrap .kv-day-cell input{width:58px;background:transparent;border:none;color:var(--kv-text);font-size:13px;text-align:center;padding:7px 2px;font-family:inherit}
#kpi-view-wrap .kv-day-cell input:focus{outline:1px solid var(--navy);border-radius:3px;background:#dde4f5}
#kpi-view-wrap .kv-day-cell.weekend-cell{background:#f0faf5}
#kpi-view-wrap .kv-day-cell.holiday-cell{background:#fffbeb}
#kpi-view-wrap .kv-day-cell.feriado-cell{background:#fff5f5}
#kpi-view-wrap .kv-day-cell.today-cell{background:#fff8f3}
#kpi-view-wrap .kv-pct-cell{font-weight:700;font-size:13px;text-align:center;padding:7px 6px}
#kpi-view-wrap .pct-good{color:#059669}.pct-warn{color:#d97706}.pct-bad{color:#dc2626}.pct-dash{color:#9aa0a8}
#kpi-view-wrap .kv-acum-cell{background:var(--kv-surface2);text-align:center;padding:6px 8px;border-right:1px solid var(--kv-border);font-size:12px;color:var(--kv-text)}
#kpi-view-wrap .kv-acum-header{background:var(--teal);color:#fff!important}
#kpi-view-wrap .kv-disc-group-row td{border-top:2px solid var(--kv-border2)}
#kpi-view-wrap .kv-acum-split{display:flex;gap:6px;justify-content:center;align-items:center}
#kpi-view-wrap .kv-acum-split-item{display:flex;flex-direction:column;align-items:center;gap:1px}
#kpi-view-wrap .kv-acum-split-val{font-size:12px;font-weight:700}
#kpi-view-wrap .kv-acum-split-tag{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:600}
#kpi-view-wrap .kv-tag-qt{background:#dde9ff;color:var(--navy)}
#kpi-view-wrap .kv-tag-ql{background:#d1fae5;color:#065f46}
#kpi-view-wrap .kv-pend-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;padding:14px}
#kpi-view-wrap .kv-pend-card{background:var(--kv-surface2);border:1px solid var(--kv-border);border-radius:var(--r2);padding:12px;position:relative}
#kpi-view-wrap .kv-pend-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
#kpi-view-wrap .kv-pend-disc-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;background:#dde9ff;color:var(--navy)}
#kpi-view-wrap .kv-pend-status-tag{font-size:10px;padding:2px 8px;border-radius:4px;cursor:pointer;border:none;font-family:inherit;font-weight:600}
#kpi-view-wrap .kv-pend-textarea{width:100%;background:#fff;border:1px solid var(--kv-border);color:var(--kv-text);border-radius:var(--r);padding:7px 9px;font-size:12px;font-family:inherit;resize:vertical;min-height:60px;line-height:1.5}
#kpi-view-wrap .kv-pend-textarea:focus{outline:none;border-color:var(--navy)}
#kpi-view-wrap .kv-pend-date{font-size:10px;color:var(--kv-text2);margin-top:5px}
#kpi-view-wrap .kv-pend-meta{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
#kpi-view-wrap .kv-pend-meta-field{flex:1;min-width:120px}
#kpi-view-wrap .kv-pend-meta-label{font-size:10px;color:var(--kv-text2);margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px;font-weight:700}
#kpi-view-wrap .kv-pend-meta-input{width:100%;background:#fff;border:1px solid var(--kv-border);color:var(--kv-text);border-radius:var(--r);padding:5px 8px;font-size:12px;font-family:inherit}
#kpi-view-wrap .kv-pend-meta-input:focus{outline:none;border-color:var(--navy)}
#kpi-view-wrap .kv-pend-add-btn{display:flex;align-items:center;gap:6px;background:var(--kv-surface2);border:1px dashed var(--kv-border2);border-radius:var(--r2);padding:10px 14px;cursor:pointer;color:var(--kv-text2);font-size:12px;font-family:inherit;width:100%;justify-content:center;transition:all .15s}
#kpi-view-wrap .kv-pend-add-btn:hover{border-color:var(--navy);color:var(--navy)}
#kpi-view-wrap .kv-pend-del{position:absolute;top:8px;right:8px;background:transparent;border:none;color:var(--kv-text2);cursor:pointer;font-size:14px;padding:2px 5px;border-radius:4px}
#kpi-view-wrap .kv-pend-del:hover{color:#dc2626;background:var(--kv-surface3)}
#kpi-view-wrap .kv-pend-add-row{padding:10px 14px;border-top:1px solid var(--kv-border);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
#kpi-view-wrap .kv-footer-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:linear-gradient(135deg,var(--navy) 0%,#1e3a8a 60%,var(--teal) 100%);border-radius:var(--r2);flex-wrap:wrap;gap:10px;margin-bottom:12px;color:#fff}
#kpi-view-wrap .kv-footer-stat .kv-fs-val{font-size:22px;font-weight:900;color:#fff}
#kpi-view-wrap .kv-footer-stat .kv-fs-label{font-size:11px;color:rgba(255,255,255,.7);margin-top:2px}
#kpi-view-wrap .kv-signature{border:1px solid var(--kv-border);border-radius:var(--r2);background:var(--kv-surface);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;box-shadow:var(--sh)}
#kpi-view-wrap .kv-sig-left{display:flex;align-items:center;gap:12px}
#kpi-view-wrap .kv-sig-avatar{width:36px;height:36px;border-radius:50%;background:var(--navy);border:1px solid var(--teal);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#fff;flex-shrink:0}
#kpi-view-wrap .kv-sig-name{font-size:13px;font-weight:800;color:var(--navy)}
#kpi-view-wrap .kv-sig-contact{font-size:11px;color:var(--kv-text2);margin-top:2px}
#kpi-view-wrap .kv-sig-contact a{color:var(--navy);text-decoration:none}
#kpi-view-wrap .kv-sig-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
#kpi-view-wrap .kv-sig-tag{font-size:11px;padding:3px 9px;border-radius:var(--r);border:1px solid var(--kv-border);color:var(--kv-text2);background:var(--kv-surface2)}
#kpi-view-wrap .kv-sig-tag.blue{border-color:var(--navy);color:var(--navy);background:#dde9ff}
#kpi-view-wrap .kv-sig-tag.teal{border-color:var(--teal);color:var(--teal);background:#e0f5f9}
#kpi-view-wrap .kv-sig-div{width:1px;height:28px;background:var(--kv-border);flex-shrink:0}
@media(max-width:1200px){.wla-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:900px){.grid2,.grid3{grid-template-columns:1fr}.wla-grid{grid-template-columns:1fr 1fr}.kpi-row{grid-template-columns:repeat(2,1fr)}#kpi-view-wrap .kv-kpi-cards{grid-template-columns:repeat(2,1fr)}}

// ── DATA HELPERS ─────────────────────────────────────────
// Get total realizado (qt+ql) for a disc across all weeks
function discAcum(discName) {
  let qt=0, ql=0, pqt=0, pql=0;
  K_WEEKS.forEach(w=>{
    const d=kState.weeks[w.num]?.disc[discName];
    if(!d) return;
    qt += (d.real_qt||[]).reduce((a,b)=>a+b,0);
    ql += (d.real_ql||[]).reduce((a,b)=>a+b,0);
    pqt += (d.prog_qt||[]).reduce((a,b)=>a+b,0);
    pql += (d.prog_ql||[]).reduce((a,b)=>a+b,0);
  });
  return {qt,ql,pqt,pql,total:qt+ql,prog:pqt+pql};
}

function discWeekData(discName, weekNum) {
  return kState.weeks[weekNum]?.disc[discName] || {prog_qt:Array(7).fill(0),real_qt:Array(7).fill(0),prog_ql:Array(7).fill(0),real_ql:Array(7).fill(0)};
}

function weekTotal(weekNum, type) { // type: 'prog'|'real'
  let t=0;
  K_DISCS.forEach(d=>{
    const wd=kState.weeks[weekNum]?.disc[d.name]; if(!wd) return;
    if(type==='prog') { t+=(wd.prog_qt||[]).reduce((a,b)=>a+b,0)+(wd.prog_ql||[]).reduce((a,b)=>a+b,0); }
    else { t+=(wd.real_qt||[]).reduce((a,b)=>a+b,0)+(wd.real_ql||[]).reduce((a,b)=>a+b,0); }
  });
  return t;
}

// cumulative S-curve per disc per week
function buildCurves(discName) {
  const prog=[], real=[], labels=[];
  let cp=0, cr=0;
  K_WEEKS.forEach(w=>{
    const d=kState.weeks[w.num]?.disc[discName];
    const p = d ? (d.prog_qt||[]).reduce((a,b)=>a+b,0)+(d.prog_ql||[]).reduce((a,b)=>a+b,0) : 0;
    const r = d ? (d.real_qt||[]).reduce((a,b)=>a+b,0)+(d.real_ql||[]).reduce((a,b)=>a+b,0) : 0;
    cp+=p; cr+=r;
    prog.push(cp); real.push(cr);
    labels.push('S'+String(w.num).padStart(3,'0'));
  });
  return {prog,real,labels};
}

function buildCurvesGlobal() {
  const prog=[], real=[], labels=[];
  let cp=0, cr=0;
  K_WEEKS.forEach(w=>{
    const p=weekTotal(w.num,'prog'), r=weekTotal(w.num,'real');
    cp+=p; cr+=r;
    prog.push(cp); real.push(cr);
    labels.push('S'+String(w.num).padStart(3,'0'));
  });
  return {prog,real,labels};
}

let CHARTS={};
function mkChart(id,cfg){
  if(CHARTS[id]) CHARTS[id].destroy();
  const el=document.getElementById(id); if(!el) return null;
  CHARTS[id]=new Chart(el.getContext('2d'),cfg); return CHARTS[id];
}

function todayLine(labels) {
  const idx = labels.indexOf('S'+String(CW).padStart(3,'0'));
  return { id:'todayLine', afterDraw(chart) {
    if(idx<0) return;
    const ctx=chart.ctx, xs=chart.scales.x; if(!xs) return;
    const x=xs.getPixelForValue(idx);
    if(!x||isNaN(x)||x<chart.chartArea.left||x>chart.chartArea.right) return;
    ctx.save();
    ctx.strokeStyle='#E56C35'; ctx.lineWidth=2.5; ctx.setLineDash([6,4]);
    ctx.beginPath(); ctx.moveTo(x,chart.chartArea.top); ctx.lineTo(x,chart.chartArea.bottom); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='#E56C35'; ctx.fillRect(x-22,chart.chartArea.top,44,16);
    ctx.fillStyle='#fff'; ctx.font='bold 9px Segoe UI'; ctx.textAlign='center';
    ctx.fillText('▼ HOJE',x,chart.chartArea.top+11);
    ctx.restore();
  }};
}

const VIEWS=['dashboard','curvas','wla6','restricoes','kpi'];
let _built={};
function showV(v){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach((el,i)=>el.classList.toggle('active',VIEWS[i]===v));
  document.getElementById('view-'+v)?.classList.add('active');
  if(!_built[v]){ buildView(v); _built[v]=1; }
}
function buildView(v){
  if(v==='dashboard') buildDashboard();
  else if(v==='curvas') buildCurvas();
  else if(v==='wla6') buildWla6();
  else if(v==='restricoes') buildRestricoes();
  else if(v==='kpi') buildKpiView();
}
function rebuildAll(){
  _built={};
  Object.keys(CHARTS).forEach(k=>{try{CHARTS[k].destroy();}catch{}});
  CHARTS={};
  document.querySelectorAll('.view').forEach(el=>{el.classList.remove('active');el.innerHTML='';});
  updateBadges();
  showV('dashboard');
}

function updateBadges(){
  const rest=(kState.pends||[]).filter(p=>p.status!=='concluida').length;
  document.getElementById('hdr-rest').textContent=`🚨 ${rest} Rest.`;
  document.getElementById('nb-rest').textContent=rest;
  const w=K_WEEKS.find(x=>x.num===CW);
  if(w) document.getElementById('hdr-week').textContent=`S${String(CW).padStart(3,'0')} (${w.days[0].slice(5).replace('-','/')}→${w.days[6].slice(5).replace('-','/')})`;
  document.getElementById('hdr-date').textContent=new Date().toLocaleDateString('pt-BR');
}

function buildWla6(){
  const c=document.getElementById('view-wla6'); if(!c) return;
  const wsToShow=[];
  for(let i=-1;i<=4;i++){
    const w=K_WEEKS.find(x=>x.num===CW+i);
    if(w) wsToShow.push({...w,past:i<0,cur:i===0});
  }

  const cols=wsToShow.map(w=>{
    const discsWithData=K_DISCS.filter(d=>{
      const wd=discWeekData(d.name,w.num);
      return (wd.prog_qt||[]).some(v=>v>0)||(wd.real_qt||[]).some(v=>v>0)||(wd.prog_ql||[]).some(v=>v>0)||(wd.real_ql||[]).some(v=>v>0);
    });
    const totP=weekTotal(w.num,'prog'), totR=weekTotal(w.num,'real');
    const pct=pctFmt(totR,totP);
    const hdrCls=w.past?'past':w.cur?'cur':'';
    const rows=discsWithData.map(d=>{
      const wd=discWeekData(d.name,w.num);
      const p=(wd.prog_qt||[]).reduce((a,b)=>a+b,0)+(wd.prog_ql||[]).reduce((a,b)=>a+b,0);
      const r=(wd.real_qt||[]).reduce((a,b)=>a+b,0)+(wd.real_ql||[]).reduce((a,b)=>a+b,0);
      if(!p&&!r) return '';
      const dp=pctFmt(r,p);
      const barColor=dp>=90?'var(--green)':dp>=70?'var(--yellow)':'var(--red)';
      const dname=d.name.length>14?d.name.slice(0,13)+'\u2026':d.name;
      return '<div class="wla-disc-row" style="background:'+d.color+'18">'
        +'<div class="wla-disc-name" title="'+d.name+'">'+dname+'</div>'
        +'<div class="wla-disc-vals">'
        +'<span class="wla-prog">'+Math.round(p)+'</span>'
        +'<span style="color:var(--g2)">|</span>'
        +'<span class="wla-real" style="color:'+barColor+'">'+Math.round(r)+'</span>'
        +'</div></div>'
        +'<div class="wla-pct-bar"><div class="wla-pct-fill" style="width:'+Math.min(dp,100)+'%;background:'+barColor+'"></div></div>';
    }).join('');
    const totColor=pct>=90?'var(--green)':pct>=70?'var(--yellow)':'var(--red)';
    const totPctStr=totP>0?pct+'%':'';
    return '<div class="wla-col">'
      +'<div class="wla-hdr '+hdrCls+'">'
      +'<div class="wla-title">S'+String(w.num).padStart(3,'0')+(w.cur?' \u25c4 ATUAL':'')+'</div>'
      +'<div class="wla-sub">'+w.days[0].slice(5).replace('-','/')+' \u2192 '+w.days[6].slice(5).replace('-','/')+'</div>'
      +'</div>'
      +'<div class="wla-body">'+(rows||'<div style="font-size:10px;color:var(--g2);text-align:center;padding:12px">Sem dados</div>')+'</div>'
      +'<div class="wla-totrow">P:'+Nf(Math.round(totP))+' R:<span style="color:'+totColor+'">'+Nf(Math.round(totR))+'</span>'
      +(totPctStr?' <span style="font-size:9px;color:var(--g2)">'+totPctStr+'</span>':'')
      +'</div></div>';
  }).join('');

  c.innerHTML=`
  <h2 style="font-size:13px;font-weight:800;color:var(--navy);margin-bottom:12px">🗓️ 6 Semanas — S${String(Math.max(K_WEEKS[0].num,CW-1)).padStart(3,'0')} → S${String(Math.min(K_WEEKS[K_WEEKS.length-1].num,CW+4)).padStart(3,'0')}</h2>
  <div class="wla-grid">${cols}</div>
  <div class="card full" style="margin-bottom:12px">
    <div class="card-hdr"><div class="card-title">📊 Programado vs Realizado — Próximas 6 Semanas</div></div>
    <div class="cw h260"><canvas id="ch-wla-bar"></canvas></div>
  </div>
  <div class="footer">Criado por Anderson Souza · Rev. 5.0</div>`;

  // Bar chart for 6wla
  const wlabels=wsToShow.map(w=>'S'+String(w.num).padStart(3,'0'));
  const wP=wsToShow.map(w=>weekTotal(w.num,'prog'));
  const wR=wsToShow.map(w=>weekTotal(w.num,'real'));
  mkChart('ch-wla-bar',{
    type:'bar',plugins:[todayLine(wlabels)],
    data:{labels:wlabels,datasets:[
      {label:'Programado',data:wP.map(v=>Math.round(v)),backgroundColor:'#182554aa',borderRadius:4,borderSkipped:false},
      {label:'Realizado',data:wR.map(v=>Math.round(v)),backgroundColor:'#E56C35cc',borderRadius:4,borderSkipped:false},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'bottom',labels:{font:{size:10},boxWidth:12}},tooltip:{mode:'index',intersect:false}},
      scales:{x:{grid:{display:false},ticks:{font:{size:9}}},y:{grid:{color:'#F0F3FA'},ticks:{font:{size:9}}}}}
  });
}

      <div class="rest-card ${p.status||'aberta'}">
        <span class="rest-disc">${p.disc||'Geral'}</span>
        <span class="badge" style="background:${statusColors[p.status]||'var(--grey)'}22;color:${statusColors[p.status]||'var(--grey)'};margin-left:6px">${statusLabels[p.status]||p.status}</span>

          ${p.date?`<span>📅 ${p.date}</span>`:''}
          ${p.resp?`<span>👤 ${p.resp}</span>`:''}
          ${p.prazo?`<span>⏰ ${p.prazo}</span>`:''}
        </div>
      </div>`).join('');
}

// KPI ENGINE (inalterado do original)
// ══════════════════════════════════════════════════════════
let kCurIdx=0, kCurType='todos';
function kFmtDisp(iso){if(!iso)return'';const[,m,d]=iso.split('-');const mn=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];return d+'/'+mn[+m-1];}
function kFmtDate(iso){if(!iso)return'';const[y,m,d]=iso.split('-');return d+'/'+m+'/'+y;}
function kIsWeekend(iso){const d=new Date(iso+'T00:00:00');return d.getDay()===0||d.getDay()===6;}
function kIsFeriadoNac(iso){return !!K_FERIADOS_NAC[iso];}
function kIsFeriadoLoc(iso){return !!K_FERIADOS_LOC[iso];}
function kIsToday(iso){return iso===TODAY;}
function kGetFilteredDiscs(){
  const flt=document.getElementById('kDiscSel')?.value;
  if(!flt) return K_DISCS;
  if(flt.startsWith('__g:')){const g=flt.slice(4);return K_DISCS.filter(d=>(K_DISC_GROUPS[g]||[]).includes(d.name));}
  return K_DISCS.filter(d=>d.name===flt);
}
function kInit(){
  const weekSel=document.getElementById('kWeekSel');
  K_WEEKS.forEach((w,i)=>{const o=document.createElement('option');o.value=i;o.textContent=`S${w.num} · ${kFmtDisp(w.days[0])} → ${kFmtDisp(w.days[6])}`;weekSel.appendChild(o);});
  // Set default to current week
  const cwIdx=K_WEEKS.findIndex(w=>w.num===CW);
  if(cwIdx>=0){kCurIdx=cwIdx;weekSel.value=cwIdx;}
  const kDiscSel=document.getElementById('kDiscSel');
  const kPendDiscSel=document.getElementById('k-pendDiscSel');
  const kPendFiltSel=document.getElementById('k-pendFiltSel');
  ['Tubulação','Equip. Mecânicos','Elétrico','Instrumentação'].forEach(g=>{
    const o=document.createElement('option');o.value='__g:'+g;o.textContent='▶ '+g+' (grupo)';kDiscSel.appendChild(o);
  });
  const div=document.createElement('option');div.disabled=true;div.textContent='─────────────';kDiscSel.appendChild(div);
  K_DISCS.forEach(d=>{
    [kDiscSel,kPendDiscSel,kPendFiltSel].forEach(sel=>{if(!sel)return;const o=document.createElement('option');o.value=d.name;o.textContent=d.name;sel.appendChild(o);});
  });
  document.getElementById('kWeekChip').textContent=`Semana ${K_WEEKS[kCurIdx].num}`;
  kRenderAll();
}
function kChangeWeek(){kCurIdx=Number(document.getElementById('kWeekSel').value);document.getElementById('kWeekChip').textContent=`Semana ${K_WEEKS[kCurIdx].num}`;kRenderAll();}
function kSetType(t){kCurType=t;['todos','qt','ql'].forEach(x=>document.getElementById('k-tab-'+x)?.classList.toggle('active',x===t));kRenderAll();}
function kRenderAll(){kRenderMarco();kRenderTable();kRenderAcum();kRenderPends();kRenderFooter();}
function kRenderMarco(){
  const now=new Date();now.setHours(0,0,0,0);
  const dias=Math.round((K_MARCO_FIM-now)/(1000*60*60*24));
  const total=Math.round((K_MARCO_FIM-K_MARCO_INI)/(1000*60*60*24));
  const elapsed=Math.round((now-K_MARCO_INI)/(1000*60*60*24));
  const pct=Math.max(0,Math.min(100,Math.round(elapsed/total*100)));
  const cls=dias>30?'ok':dias>7?'warn':'danger';
  const icons={ok:'✅',warn:'⚠',danger:'🚨'};
  const colors={ok:'#3fb950',warn:'#d29922',danger:'#f85149'};
  const icon=document.getElementById('kMarcoIcon'); if(icon){icon.className='kv-marco-icon '+cls;icon.textContent=icons[cls];}
  const d=document.getElementById('kMarcoDias'); if(d){d.className='kv-marco-dias '+cls;d.textContent=dias>0?`${dias}d`:dias===0?'HOJE!':'VENCIDO';}
  const f=document.getElementById('kMarcoFill'); if(f){f.style.width=pct+'%';f.style.background=colors[cls];}
  const pl=document.getElementById('kMarcoPctLabel'); if(pl) pl.textContent=pct+'% do prazo decorrido';
}
function kRenderTable(){
  const week=K_WEEKS[kCurIdx];
  const discs=kGetFilteredDiscs();
  const showQt=kCurType!=='ql', showQl=kCurType!=='qt';
  let hHtml=`<tr><th class="left" style="min-width:110px">Disciplina</th><th class="left" style="min-width:80px">Indicador</th>`;
  week.days.forEach(d=>{
    const dow=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][new Date(d+'T00:00:00').getDay()];
    let cls='day-th';
    if(kIsToday(d))cls+=' today-th';
    else if(kIsFeriadoNac(d))cls+=' feriado-th';
    else if(kIsFeriadoLoc(d))cls+=' holiday-th';
    else if(kIsWeekend(d))cls+=' weekend-th';
    hHtml+=`<th class="${cls}">${dow}<br><span style="font-size:9px;font-weight:400">${kFmtDisp(d)}</span></th>`;
  });
  hHtml+=`<th style="min-width:60px">%</th><th class="kv-acum-header" style="min-width:90px">Acum.<br><span style="font-size:9px;font-weight:400">qt+ql</span></th></tr>`;
  const thead=document.getElementById('k-tHead'); if(thead) thead.innerHTML=hHtml;
  kRenderTableBody(week,discs,showQt,showQl);
}
function kDayCls(day){
  if(kIsToday(day))return'today-cell';
  if(kIsFeriadoNac(day))return'feriado-cell';
  if(kIsFeriadoLoc(day))return'holiday-cell';
  if(kIsWeekend(day))return'weekend-cell';
  return'';
}
function kRenderTableBody(week,discs,showQt,showQl){
  let html='';let grpPrev='';
  discs.forEach(disc=>{
    const grp=disc.group||'';
    if(grp&&grp!==grpPrev){grpPrev=grp;html+=`<tr class="kv-disc-group-row"><td colspan="20" style="background:#eef1f8;padding:4px 10px;font-size:10px;color:var(--navy);font-weight:800;text-transform:uppercase;letter-spacing:.5px">${grp}</td></tr>`;}
    const wd=kState.weeks[week.num]?.disc[disc.name]||{prog_qt:Array(7).fill(0),real_qt:Array(7).fill(0),prog_ql:Array(7).fill(0),real_ql:Array(7).fill(0)};
    const rowDefs=[];
    if(showQt){rowDefs.push({lbl:'Prog.Qt',arr:'prog_qt',isProg:true});rowDefs.push({lbl:'Real.Qt',arr:'real_qt',isProg:false});}
    if(showQl){rowDefs.push({lbl:'Prog.Ql',arr:'prog_ql',isProg:true});rowDefs.push({lbl:'Real.Ql',arr:'real_ql',isProg:false});}
    const rs=rowDefs.length+1;
    let discCell=`<td class="kv-disc-cell" rowspan="${rs}" style="border-left:3px solid ${disc.color}"><div class="kv-disc-name">${disc.name}</div></td>`;
    let acQt=0,acQl=0;
    K_WEEKS.forEach(w=>{const x=kState.weeks[w.num]?.disc[disc.name];if(x){acQt+=(x.real_qt||[]).reduce((a,b)=>a+b,0);acQl+=(x.real_ql||[]).reduce((a,b)=>a+b,0);}});
    const acumCell=`<td class="kv-acum-cell" rowspan="${rs}"><div class="kv-acum-split"><div class="kv-acum-split-item"><div class="kv-acum-split-val" style="color:var(--navy)">${acQt}</div><div class="kv-acum-split-tag kv-tag-qt">qt</div></div><div class="kv-acum-split-item"><div class="kv-acum-split-val" style="color:#059669">${acQl}</div><div class="kv-acum-split-tag kv-tag-ql">ql</div></div></div></td>`;
    rowDefs.forEach((r,ri)=>{
      let cells='';
      week.days.forEach((day,di)=>{
        const v=wd[r.arr]?.[di]||0;
        const dc=kDayCls(day);
        cells+=`<td class="kv-day-cell ${dc}"><input type="number" min="0" value="${v||''}" placeholder="0" onchange="kSetVal('${disc.name}',${week.num},'${r.arr}',${di},this.value)" onfocus="this.select()"></td>`;
      });
      const tot=(wd[r.arr]||[]).reduce((a,b)=>a+b,0);
      if(ri===0) html+=`<tr>${discCell}<td class="kv-ind-cell">${r.lbl}</td>${cells}<td class="kv-acum-cell" style="font-size:11px">${tot||''}</td>${acumCell}</tr>`;
      else html+=`<tr><td class="kv-ind-cell">${r.lbl}</td>${cells}<td class="kv-acum-cell" style="font-size:11px">${tot||''}</td></tr>`;
    });
    const totProg=(wd.prog_qt||[]).reduce((a,b)=>a+b,0)+(wd.prog_ql||[]).reduce((a,b)=>a+b,0);
    const totReal=(wd.real_qt||[]).reduce((a,b)=>a+b,0)+(wd.real_ql||[]).reduce((a,b)=>a+b,0);
    const pct=totProg>0?Math.round(totReal/totProg*100):null;
    const pcls=pct===null?'pct-dash':pct>=90?'pct-good':pct>=70?'pct-warn':'pct-bad';
    let pCells='';
    week.days.forEach((day,di)=>{
      const p=(wd.prog_qt[di]||0)+(wd.prog_ql[di]||0);
      const rr=(wd.real_qt[di]||0)+(wd.real_ql[di]||0);
      const dp=p>0?Math.round(rr/p*100):null;
      const dcls=dp===null?'pct-dash':dp>=90?'pct-good':dp>=70?'pct-warn':'pct-bad';
      const dayCls=kDayCls(day);
      pCells+=`<td class="kv-day-cell ${dayCls}"><div class="kv-pct-cell ${dcls}">${dp!==null?dp+'%':'—'}</div></td>`;
    });
    html+=`<tr><td class="kv-ind-cell pct-row">% sem.</td>${pCells}<td class="kv-pct-cell ${pcls}">${pct!==null?pct+'%':'—'}</td></tr>`;
  });
  const tbody=document.getElementById('k-tBody'); if(tbody) tbody.innerHTML=html;
  // KPI cards
  const discsAll=kGetFilteredDiscs();
  const totP=discsAll.reduce((s,d)=>{const wd=kState.weeks[K_WEEKS[kCurIdx].num]?.disc[d.name];return s+(wd?((wd.prog_qt||[]).reduce((a,b)=>a+b,0)+(wd.prog_ql||[]).reduce((a,b)=>a+b,0)):0);},0);
  const totR=discsAll.reduce((s,d)=>{const wd=kState.weeks[K_WEEKS[kCurIdx].num]?.disc[d.name];return s+(wd?((wd.real_qt||[]).reduce((a,b)=>a+b,0)+(wd.real_ql||[]).reduce((a,b)=>a+b,0)):0);},0);
  const sp=totP>0?Math.round(totR/totP*100):null;
  const el1=document.getElementById('k-kc-prog'); if(el1) el1.textContent=Nf(Math.round(totP));
  const el2=document.getElementById('k-kc-real'); if(el2) el2.textContent=Nf(Math.round(totR));
  const el3=document.getElementById('k-kc-pct'); if(el3) el3.textContent=sp!==null?sp+'%':'—';
  const el4=document.getElementById('k-kc-bar'); if(el4){el4.style.width=(sp||0)+'%';el4.style.background=sp>=90?'#059669':sp>=70?'var(--orange)':'var(--red)';}
}
function kSetVal(disc,weekNum,arr,di,val){
  if(!kState.weeks[weekNum]) kState.weeks[weekNum]={disc:{}};
  if(!kState.weeks[weekNum].disc[disc]) kState.weeks[weekNum].disc[disc]={prog_qt:Array(7).fill(0),real_qt:Array(7).fill(0),prog_ql:Array(7).fill(0),real_ql:Array(7).fill(0)};
  kState.weeks[weekNum].disc[disc][arr][di]=parseFloat(val)||0;
  kSave();
  // Re-render KPI table + cards + acum + footer imediatamente
  kRenderAll();
  // Marca outras views para rebuild no próximo acesso
  _built.dashboard=0; _built.curvas=0; _built.wla6=0; _built.restricoes=0;
}
function kRenderAcum(){
  const tbody=document.getElementById('k-acumBody'); if(!tbody) return;
  const totExec=K_DISCS.reduce((s,d)=>{const a=discAcum(d.name);return s+a.total;},0);
  const totTot=K_DISCS.reduce((s,d)=>s+(d.qt+d.ql),0);
  tbody.innerHTML=K_DISCS.filter(d=>d.qt>0||d.ql>0).map(d=>{
    const a=discAcum(d.name);
    const tot=d.qt+d.ql;
    const pct=pctFmt(a.total,tot);
    const falta=Math.max(0,tot-a.total);
    const pcls=pct>=90?'#059669':pct>=50?'var(--orange)':'var(--red)';
    const status=pct>=90?`<span class="badge b-ok">✅ Adiantado</span>`:pct>=50?`<span class="badge b-warn">⏳ Em andamento</span>`:`<span class="badge b-danger">⚠ Pendente</span>`;
    return `<tr>
      <td style="border-left:3px solid ${d.color};padding-left:10px"><strong>${d.name}</strong></td>
      <td style="text-align:center">${Nf(tot)}</td>
      <td style="text-align:center;color:var(--navy);font-weight:700">${Nf(Math.round(a.qt))}</td>
      <td style="text-align:center;color:#059669;font-weight:700">${Nf(Math.round(a.ql))}</td>
      <td style="text-align:center">
        <div style="display:flex;align-items:center;gap:5px;justify-content:center">
          <div style="width:60px;height:6px;background:var(--bdr);border-radius:3px;overflow:hidden"><div style="width:${Math.min(pct,100)}%;height:6px;background:${pcls};border-radius:3px"></div></div>
          <span style="font-weight:700;color:${pcls}">${pct}%</span>
        </div>
      </td>
      <td style="text-align:center;color:${falta>0?'var(--orange)':'var(--green)'};font-weight:700">${Nf(Math.round(falta))}</td>
      <td>${status}</td>
    </tr>`;
  }).join('');
  // Footer acum
  const el1=document.getElementById('k-kc-acum'); if(el1) el1.textContent=Nf(Math.round(totExec));
  const el2=document.getElementById('k-kc-acum-sub'); if(el2) el2.textContent=pctFmt(totExec,totTot)+'% concluído';
  const el3=document.getElementById('k-kc-falta'); if(el3) el3.textContent=Nf(Math.round(Math.max(0,totTot-totExec)));
}
function kRenderPends(){
  const flt=document.getElementById('k-pendFiltSel')?.value;
  const pends=(kState.pends||[]).filter(p=>!flt||p.disc===flt);
  const cnt=document.getElementById('k-pendCount'); if(cnt) cnt.textContent=pends.length+' pendências';
  const grid=document.getElementById('k-pendGrid'); if(!grid) return;
  const statusColors={aberta:'#dc2626',andamento:'#d97706',concluida:'#059669'};
  const statusBgs={aberta:'#fee2e2',andamento:'#fef3c7',concluida:'#d1fae5'};
  const statusLabels={aberta:'Aberta',andamento:'Em andamento',concluida:'Concluída'};
  grid.innerHTML=pends.map((p)=>{
    const discIdx=kState.pends.indexOf(p);
    return `<div class="kv-pend-card">
      <button class="kv-pend-del" onclick="kDelPend(${discIdx})">✕</button>
      <div class="kv-pend-card-header">
        <span class="kv-pend-disc-tag">${p.disc||'Geral'}</span>
        <button class="kv-pend-status-tag" style="background:${statusBgs[p.status]||'#eef1f8'};color:${statusColors[p.status]||'var(--grey)'}" onclick="kCycleStatus(${discIdx})">${statusLabels[p.status]||p.status}</button>
      </div>
      <textarea class="kv-pend-textarea" oninput="kState.pends[${discIdx}].text=this.value;kSave()">${p.text||''}</textarea>
      <div class="kv-pend-meta">
        <div class="kv-pend-meta-field"><div class="kv-pend-meta-label">Responsável</div><input class="kv-pend-meta-input" type="text" value="${p.resp||''}" oninput="kState.pends[${discIdx}].resp=this.value;kSave()"></div>
        <div class="kv-pend-meta-field"><div class="kv-pend-meta-label">Prazo</div><input class="kv-pend-meta-input" type="date" value="${p.prazo||''}" oninput="kState.pends[${discIdx}].prazo=this.value;kSave();kRenderPends()"></div>
      </div>
      <div class="kv-pend-date">Criado: ${p.date||p.created||'—'}</div>
    </div>`;
  }).join('');
}
function kAddPend(){
  const disc=document.getElementById('k-pendDiscSel')?.value||'Geral';
  const status=document.getElementById('k-pendStatusSel')?.value||'aberta';
  kState.pends.push({disc,status,text:'',resp:'',prazo:'',date:new Date().toLocaleDateString('pt-BR')});
  kSave(); kRenderPends(); updateBadges();
  // refresh restricoes view if built
  if(_built.restricoes){_built.restricoes=0; buildRestricoes();}
}
function kDelPend(i){
  kState.pends.splice(i,1); kSave(); kRenderPends(); updateBadges();
  if(_built.restricoes){_built.restricoes=0; buildRestricoes();}
}
function kCycleStatus(i){
  const order=['aberta','andamento','concluida'];
  const cur=kState.pends[i].status||'aberta';
  kState.pends[i].status=order[(order.indexOf(cur)+1)%3];
  kSave(); kRenderPends(); updateBadges();
  if(_built.restricoes){_built.restricoes=0; buildRestricoes();}
}
function kRenderFooter(){
  const totExec=K_DISCS.reduce((s,d)=>{const a=discAcum(d.name);return s+a.total;},0);
  const totTot=K_DISCS.reduce((s,d)=>s+(d.qt+d.ql),0);
  const weeksWithData=K_WEEKS.filter(w=>weekTotal(w.num,'real')>0).length;
  const el1=document.getElementById('k-ft-total'); if(el1) el1.textContent=Nf(Math.round(totExec));
  const el2=document.getElementById('k-ft-pct'); if(el2) el2.textContent=pctFmt(totExec,totTot)+'%';
  const el3=document.getElementById('k-ft-falta'); if(el3) el3.textContent=Nf(Math.round(Math.max(0,totTot-totExec)));
  const el4=document.getElementById('k-ft-weeks'); if(el4) el4.textContent=weeksWithData;
}
function kExportarPlanilha(){
  if(typeof XLSX==='undefined'){alert('Biblioteca XLSX não carregada.');return;}
  const wb=XLSX.utils.book_new();
  K_WEEKS.forEach(w=>{
    const rows=[['Disciplina','Indicador',...w.days,'Total']];
    K_DISCS.forEach(d=>{
      const wd=kState.weeks[w.num]?.disc[d.name]||{prog_qt:Array(7).fill(0),real_qt:Array(7).fill(0),prog_ql:Array(7).fill(0),real_ql:Array(7).fill(0)};
      ['prog_qt','real_qt','prog_ql','real_ql'].forEach(k=>{
        const vals=wd[k]||Array(7).fill(0);
        rows.push([d.name,k,...vals,vals.reduce((a,b)=>a+b,0)]);
      });
    });
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(rows),`S${w.num}`);
  });
  XLSX.writeFile(wb,'KPI_Inspecao.xlsx');
}

// kDriveToggle no KPI aponta para o mesmo driveToggle() do header

// ══════════════════════════════════════════════════════════
// GOOGLE DRIVE — OAuth2 Implicit Flow (igual ao index.html)
// Sem gapi, sem initTokenClient. Funciona 100% no GitHub Pages.
// ══════════════════════════════════════════════════════════
const DRIVE_CLIENT_ID = '188106832369-vhde8aeukj7ifcl8c7fdigmtkdgvrn2m.apps.googleusercontent.com';
const DRIVE_FILENAME  = 'kpi_state.json';
const DRIVE_SCOPE     = 'https://www.googleapis.com/auth/drive';

let _driveToken     = null;
let _driveFileId    = null;
let _driveReady     = false;
let _driveSaveTimer = null;

function _setStatus(msg, color) {
  // Badge de status no KPI Semanal (somente texto)
  const kSt=document.getElementById('kDriveStatus');
  if(kSt){ kSt.textContent=msg; kSt.style.color=color||'rgba(255,255,255,.65)'; }
  // Status no header
  const hSt=document.getElementById('driveStatus');
  if(hSt){ hSt.textContent=msg; hSt.style.color=color||'rgba(255,255,255,.65)'; }
  // Botão único no header
  const btn=document.getElementById('driveBtn');
  if(!btn) return;
  if(color==='#3fb950'){
    btn.textContent='☁ Drive ✓';
    Object.assign(btn.style,{background:'rgba(5,150,105,.3)',color:'#6ee7b7',borderColor:'rgba(5,150,105,.5)'});
    btn.title='Clique para desconectar';
  } else if(color==='#f85149'){
    Object.assign(btn.style,{background:'rgba(220,38,38,.2)',color:'#fca5a5',borderColor:'rgba(220,38,38,.4)'});
  } else {
    btn.textContent='☁ Conectar Drive';
    Object.assign(btn.style,{background:'rgba(255,255,255,.15)',color:'#fff',borderColor:'rgba(255,255,255,.3)'});
    btn.title='';
  }
}

// ── OAuth2 Implicit Flow — abre popup e captura o token ──
function _getToken() {
  return new Promise((resolve, reject) => {
    // redirect_uri = exatamente o mesmo que está autorizado no Google Cloud Console
    // Para GitHub Pages: https://andersonjhonathan.github.io/kpi_controle_de_inspecoes/
    const redirectUri = location.origin + location.pathname.replace(/\/[^\/]*$/, '/') + 'oauth_redirect.html';
    const url = 'https://accounts.google.com/o/oauth2/v2/auth?' + new URLSearchParams({
      client_id:     DRIVE_CLIENT_ID,
      redirect_uri:  redirectUri,
      response_type: 'token',
      scope:         DRIVE_SCOPE,
      prompt:        'select_account',
    });

    // Escutar mensagem postMessage vinda do popup (oauth_redirect.html)
    function onMsg(e) {
      if (e.origin !== location.origin) return;
      if (e.data && e.data.type === 'oauth_token') {
        cleanup();
        e.data.token ? resolve(e.data.token) : reject(new Error('Token não recebido'));
      }
    }
    window.addEventListener('message', onMsg);

    const popup = window.open(url, 'google_oauth', 'width=500,height=620,left=200,top=100');
    if (!popup) { window.removeEventListener('message', onMsg); reject(new Error('Popup bloqueado! Permita popups para este site.')); return; }

    // Fallback: polling direto (funciona quando popup e parent têm mesmo origin)
    const interval = setInterval(() => {
      try {
        const href = popup.location.href;
        if (href && href.includes('access_token')) {
          const params = new URLSearchParams(href.split('#')[1] || href.split('?')[1]);
          const token = params.get('access_token');
          if (token) { cleanup(); resolve(token); }
        }
      } catch(e) { /* cross-origin enquanto no Google — aguardar redirecionamento */ }
      if (popup.closed) { cleanup(); reject(new Error('Login cancelado pelo usuário')); }
    }, 400);

    const timeout = setTimeout(() => { cleanup(); reject(new Error('Tempo de login expirado')); }, 180000);

    function cleanup() {
      clearInterval(interval);
      clearTimeout(timeout);
      window.removeEventListener('message', onMsg);
      if (popup && !popup.closed) popup.close();
    }
  });
}

// ── Toggle ────────────────────────────────────────────────
async function driveToggle() {
  if (_driveReady) { _driveDisconnect(); return; }
  const btn = document.getElementById('driveBtn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Aguardando...'; }
  _setStatus('Abrindo login...', '#d29922');
  try {
    _driveToken  = await _getToken();
    _setStatus('Localizando arquivo...', '#d29922');
    _driveFileId = await _findOrCreateFile();
    _driveReady  = true;
    _setStatus('Sincronizado ✓', '#3fb950');
    await _driveLoad();
  } catch(err) {
    console.error('Drive error:', err);
    _setStatus('Erro!', '#f85149');
    alert('Erro ao conectar com Google Drive.\n\n' + err.message +
          '\n\nVerifique:\n• CLIENT_ID correto\n• Domínio autorizado no Google Cloud Console');
  } finally {
    if (btn) btn.disabled = false;
  }
}

function _driveDisconnect() {
  _driveReady = false; _driveToken = null; _driveFileId = null;
  _setStatus('Desconectado', null);
}

// ── Drive API via fetch puro ──────────────────────────────
function _auth() { return { Authorization: 'Bearer ' + _driveToken }; }

async function _findOrCreateFile() {
  const q = encodeURIComponent("name contains 'kpi_state' and trashed=false");
  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name,modifiedTime,size)&orderBy=modifiedTime+desc&spaces=drive`,
    { headers: _auth() }
  );
  if (!res.ok) throw new Error('Erro ao buscar arquivo: HTTP ' + res.status);
  const data = await res.json();
  console.log('[KPI Drive] Arquivos encontrados:', JSON.stringify(data.files));
  if (data.files && data.files.length > 0) {
    const sorted = data.files.sort((a, b) => (parseInt(b.size)||0) - (parseInt(a.size)||0));
    console.log('[KPI Drive] Usando:', sorted[0].name, sorted[0].id, 'size:', sorted[0].size);
    sorted.slice(1).forEach(f => {
      fetch(`https://www.googleapis.com/drive/v3/files/${f.id}`, { method: 'DELETE', headers: _auth() });
    });
    return sorted[0].id;
  }
  console.log('[KPI Drive] Nenhum arquivo — criando novo');
  return _createFile();
}

async function _createFile() {
  const boundary = 'KPI_BOUND_' + Date.now();
  const meta     = JSON.stringify({ name: DRIVE_FILENAME, mimeType: 'application/json' });
  const body     = `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${meta}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(kState)}\r\n--${boundary}--`;
  const res = await fetch(
    'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',
    { method:'POST', headers:{..._auth(),'Content-Type':`multipart/related; boundary="${boundary}"`}, body }
  );
  if (!res.ok) throw new Error('Erro ao criar arquivo: HTTP ' + res.status);
  const data = await res.json();
  return data.id;
}

async function _driveLoad() {
  _setStatus('Carregando dados...', '#d29922');
  try {
    const text = await new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open('GET', `https://www.googleapis.com/drive/v3/files/${_driveFileId}?alt=media`);
      xhr.setRequestHeader('Authorization', 'Bearer ' + _driveToken);
      xhr.responseType = 'text';
      xhr.onload = () => xhr.status === 200 ? resolve(xhr.responseText) : reject(new Error('HTTP ' + xhr.status + ': ' + xhr.responseText.slice(0,100)));
      xhr.onerror = () => reject(new Error('Erro de rede ao baixar arquivo'));
      xhr.send();
    });
    console.log('[KPI Drive] Recebido (100 chars):', text.slice(0, 100));
    let loaded;
    try { loaded = JSON.parse(text); } catch(e) { throw new Error('JSON inválido. Recebido: ' + text.slice(0,100)); }
    if (loaded && loaded.weeks) {
      kState = loaded;
      K_WEEKS.forEach(w => {
        if (!kState.weeks[w.num]) kState.weeks[w.num] = { disc: {} };
        K_DISCS.forEach(d => {
          if (!kState.weeks[w.num].disc[d.name])
            kState.weeks[w.num].disc[d.name] = { prog_qt:Array(7).fill(0), real_qt:Array(7).fill(0), prog_ql:Array(7).fill(0), real_ql:Array(7).fill(0) };
        });
      });
      if (!kState.pends) kState.pends = [];
      try { localStorage.setItem('kpi_v4', JSON.stringify(kState)); } catch(e) {}
      // Reset completo — destrói charts e views para refletir dados do Drive
      _built={};
      Object.keys(CHARTS).forEach(k=>{try{CHARTS[k].destroy();}catch{}});
      CHARTS={};
      document.querySelectorAll('.view').forEach(el=>{el.classList.remove('active');el.innerHTML='';});
      _kpiInited=false;
      updateBadges();
      showV('dashboard');
    } else {
      await _driveSaveNow();
    }
    _setStatus('Sincronizado ✓', '#3fb950');
  } catch(err) {
    console.error('Erro ao carregar:', err);
    _setStatus('Erro ao carregar', '#f85149');
  }
}

function driveSave() {
  if (!_driveReady) return;
  clearTimeout(_driveSaveTimer);
  _setStatus('Salvando...', '#d29922');
  _driveSaveTimer = setTimeout(_driveSaveNow, 2000);
}

async function _driveSaveNow() {
  if (!_driveReady || !_driveFileId || !_driveToken) return;
  try {
    const res = await fetch(
      `https://www.googleapis.com/upload/drive/v3/files/${_driveFileId}?uploadType=media`,
      { method:'PATCH', headers:{..._auth(),'Content-Type':'application/json'}, body:JSON.stringify(kState) }
    );
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const t = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    _setStatus(`Salvo ✓ ${t}`, '#3fb950');
  } catch(err) {
    console.error('Erro ao salvar:', err);
    _setStatus('Erro ao salvar!', '#f85149');
  }
}
